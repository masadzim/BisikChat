name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "build-tools;33.0.2" "platforms;android-33"
      - run: unzip -o BisikChat-v2-fixed.zip -d project
      - run: chmod +x project/gradlew
      - run: cd project && ./gradlew assembleDebug --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: BisikChat-APK
          path: project/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
