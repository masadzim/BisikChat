name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: unzip BisikChat-v2.zip
      - run: chmod +x BisikChat/gradlew
      - run: cd BisikChat && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v3
        with:
          name: BisikChat-APK
          path: BisikChat/app/build/outputs/apk/debug/*.apk
