# This is a GitHub Actions configuration file for building an Android project using Gradle.

name: Android CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set up Android SDK
        run: |
          sudo apt-get update;
          sudo apt-get install -y wget unzip;
          wget https://dl.google.com/android/repository/commandlinetools-linux-7983922_latest.zip;
          mkdir -p $HOME/androidsdk/cmdline-tools;
          unzip commandlinetools-linux-7983922_latest.zip -d $HOME/androidsdk/cmdline-tools;
          rm commandlinetools-linux-7983922_latest.zip;
          yes | $HOME/androidsdk/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/androidsdk "platform-tools" "platforms;android-30";
          echo "##[set-env name=ANDROID_HOME;]$HOME/androidsdk";

      - name: Cache Gradle packages
        uses: actions/cache@v2
        with:
          path: ~/.gradle/caches/**/*
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Gradle build
        run: |
          chmod +x ./gradlew;
          ./gradlew build --info --stacktrace
          
